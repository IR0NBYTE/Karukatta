name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler
        run: |
          mkdir -p build
          g++ -std=c++17 -O2 main.cpp -o build/karukatta

      - name: Test programs (obf=0)
        run: |
          for f in example/*.kar; do
            name=$(basename $f .kar)
            ./build/karukatta $f -o build/$name --target=x86_64-linux --obf=0 2>&1
          done
          build/example; test $? -eq 5
          build/test_arith; test $? -eq 13
          build/test_cmp; test $? -eq 1

      - name: Test obfuscation levels
        run: |
          for obf in 1 2; do
            ./build/karukatta example/example.kar -o build/obf_test --target=x86_64-linux --obf=$obf --seed=42 2>&1
            build/obf_test; test $? -eq 5
          done

      - name: Build release binary
        run: g++ -std=c++17 -O2 -static main.cpp -o karukatta-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: karukatta-linux-x86_64
          path: karukatta-linux-x86_64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler
        run: |
          mkdir -p build
          g++ -std=c++17 -O2 main.cpp -o build/karukatta

      - name: Test programs (obf=0)
        run: |
          for f in example/*.kar; do
            name=$(basename $f .kar)
            ./build/karukatta $f -o build/$name --obf=0 2>&1
          done
          build/example; test $? -eq 5
          build/test_arith; test $? -eq 13
          build/test_cmp; test $? -eq 1

      - name: Test obfuscation levels
        run: |
          for obf in 1 2; do
            ./build/karukatta example/example.kar -o build/obf_test --obf=$obf --seed=42 2>&1
            build/obf_test; test $? -eq 5
          done

      - name: Build release binary
        run: g++ -std=c++17 -O2 main.cpp -o karukatta-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: karukatta-macos-arm64
          path: karukatta-macos-arm64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Build compiler
        shell: msys2 {0}
        run: g++ -std=c++17 -O2 main.cpp -o karukatta-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: karukatta-windows-x86_64
          path: karukatta-windows-x86_64.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f | head -20
