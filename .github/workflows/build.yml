name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler
        run: |
          mkdir -p build
          g++ -std=c++17 -O2 main.cpp -o build/karukatta

      - name: Test programs
        run: |
          set +e
          FAIL=0

          check() {
            local bin=$1 expected=$2
            $bin; local got=$?
            if [ "$got" -ne "$expected" ]; then
              echo "FAIL: $bin exited $got, expected $expected"
              FAIL=1
            else
              echo "PASS: $bin -> $got"
            fi
          }

          for f in example/*.kar; do
            name=$(basename $f .kar)
            ./build/karukatta $f -o build/$name --target=x86_64-linux --obf=0 2>&1
          done

          check build/example 5
          check build/test_arith 13
          check build/test_cmp 1
          check build/test_while 42
          check build/test_nested 1
          check build/test_complex 15
          check build/test_all_cmp 3
          check build/test_ifelse_chain 2

          if [ "$FAIL" -eq 1 ]; then exit 1; fi

      - name: Test obfuscation
        run: |
          set +e
          for obf in 1 2; do
            ./build/karukatta example/example.kar -o build/obf_test --target=x86_64-linux --obf=$obf --seed=42 2>&1
            build/obf_test; got=$?
            if [ "$got" -ne 5 ]; then echo "FAIL obf=$obf: $got"; exit 1; fi
            echo "PASS obf=$obf"
          done

      - name: Build release binary
        run: g++ -std=c++17 -O2 -static main.cpp -o karukatta-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: karukatta-linux-x86_64
          path: karukatta-linux-x86_64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler
        run: |
          mkdir -p build
          g++ -std=c++17 -O2 main.cpp -o build/karukatta

      - name: Test programs
        run: |
          set +e
          FAIL=0

          check() {
            local bin=$1 expected=$2
            $bin; local got=$?
            if [ "$got" -ne "$expected" ]; then
              echo "FAIL: $bin exited $got, expected $expected"
              FAIL=1
            else
              echo "PASS: $bin -> $got"
            fi
          }

          for f in example/*.kar; do
            name=$(basename $f .kar)
            ./build/karukatta $f -o build/$name --obf=0 2>&1
          done

          check build/example 5
          check build/test_arith 13
          check build/test_cmp 1

          if [ "$FAIL" -eq 1 ]; then exit 1; fi

      - name: Test obfuscation
        run: |
          set +e
          for obf in 1 2; do
            ./build/karukatta example/example.kar -o build/obf_test --obf=$obf --seed=42 2>&1
            build/obf_test; got=$?
            if [ "$got" -ne 5 ]; then echo "FAIL obf=$obf: $got"; exit 1; fi
            echo "PASS obf=$obf"
          done

      - name: Build release binary
        run: g++ -std=c++17 -O2 main.cpp -o karukatta-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: karukatta-macos-arm64
          path: karukatta-macos-arm64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Build compiler
        shell: msys2 {0}
        run: g++ -std=c++17 -O2 main.cpp -o karukatta-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: karukatta-windows-x86_64
          path: karukatta-windows-x86_64.exe
